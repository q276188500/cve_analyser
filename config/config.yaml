# CVE Review SKILL 配置

# 代码仓配置
kernel_repo:
  path: "~/workspace/linux-kernel/linux-5.10"
  branch: "main"

# kconfig使能配置文件
kernel_config:
  path: "~/workspace/linux-kernel/linux-5.10/.config"

# cve-analyzer 配置
cve_analyzer:
  path: "scripts/cve-analyzer"

# 知识库配置
knowledge_base:
  path: "knowledge/"
  kconfig_rules: "knowledge/kconfig/"

# 报告配置
reports:
  output_dir: "reports/"
  format:
    - markdown

# 分析配置
analysis:
  default_action: "merge"
  require_reason_on_defer: true
  code_query_enabled: true
  independent_analysis: true
  parallel_analysis: 3

# 输出模式
output_mode:
  # normal: 只输出最终报告
  # verbose: 输出完整推理过程
  default: "normal"
  verbose_reasoning: true
